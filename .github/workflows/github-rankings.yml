name: GitHub Rankings

on:
  schedule:
    # 最热门榜单：每周二下午 5 点推送 (UTC+8 时区 = UTC 早上 9 点)
    - cron: '0 9 * * 2'
    # 上升趋势榜单：每天下午 4 点推送 (UTC+8 时区 = UTC 早上 8 点)
    - cron: '0 8 * * *'
  workflow_dispatch:

