          cat /tmp/popular.txt >> ranking.md

      - name: Create Issue for Hot Ranking
        run: |
          BODY=$(cat ranking.md)
          gh issue create \
            --title "📊 最热门榜单 - $(date +'%Y年%m月%d日')" \
            --body "$BODY" \
            --label "ranking,hot"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

