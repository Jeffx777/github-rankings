name: GitHub Rankings

on:
  schedule:
    # 最热门榜单：每周二下午 5 点推送 (UTC+8 时区)
    - cron: '0 9 * * 2'
    # 上升趋势榜单：每天下午 4 点推送 (UTC+8 时区)  
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  hot-ranking:
    if: github.event.schedule == '0 9 * * 2' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Top 10 Most Popular Repos (Last 30 Days)
        id: fetch_popular
        run: |
          DATE=$(date -u -d '30 days ago' '+%Y-%m-%d')
          echo "## 🔥 最热门榜单（过去30天）" > ranking.md
          echo "更新时间：$(date +'%Y-%m-%d %H:%M:%S')" >> ranking.md
          echo "" >> ranking.md
          
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/search/repositories?q=created:>=${DATE}&sort=stars&order=desc&per_page=10" \
            | jq -r '.items[] | "| \(.full_name) | ⭐ \(.stargazers_count) | [查看](https://github.com/\(.full_name)) |"' > /tmp/popular.txt
          
          echo "| 仓库名 | Stars | 链接 |" >> ranking.md
          echo "|--------|-------|------|" >> ranking.md
          cat /tmp/popular.txt >> ranking.md

      - name: Create Issue for Hot Ranking
        run: |
          BODY=$(cat ranking.md)
          gh issue create \
            --title "📊 最热门榜单 - $(date +'%Y年%m月%d日')" \
            --body "$BODY" \
            --label "ranking,hot"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trend-ranking:
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Top 10 Fastest Rising Repos (Last 30 Days)
        id: fetch_trending
        run: |
          DATE=$(date -u -d '30 days ago' '+%Y-%m-%d')
          echo "## 📈 上升趋势榜单（过去30天）" > trending.md
          echo "更新时间：$(date +'%Y-%m-%d %H:%M:%S')" >> trending.md
          echo "" >> trending.md
          
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/search/repositories?q=created:>=${DATE}&sort=stars&order=desc&per_page=10" \
            | jq -r '.items[] | select(.stargazers_count > 100) | "| \(.full_name) | ⭐ \(.stargazers_count) | [查看](https://github.com/\(.full_name)) |"' > /tmp/trending.txt
          
          echo "| 仓库名 | Stars | 链接 |" >> trending.md
          echo "|--------|-------|------|" >> trending.md
          cat /tmp/trending.txt >> trending.md

      - name: Create Issue for Trend Ranking
        run: |
          BODY=$(cat trending.md)
          gh issue create \
            --title "📈 上升趋势榜单 - $(date +'%Y年%m月%d日')" \
            --body "$BODY" \
            --label "ranking,trending"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
